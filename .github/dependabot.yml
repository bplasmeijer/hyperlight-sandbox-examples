version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
      - "dependabot"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

    # Enable this block when the repository has a supported Python manifest,
    # such as pyproject.toml, requirements.txt, or requirements-dev.txt.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "pip"
      - "dependabot"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5